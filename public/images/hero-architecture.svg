<svg width="320" height="190" viewBox="0 0 320 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Схема интеграции Bitrix, сервисов и 1C через API</title>
  <desc id="desc">Упрощенная архитектурная схема: Bitrix, сервисы и 1C связаны с API, API связан с DB.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#68746B" />
    </marker>
    <filter id="paper-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-color="#2f2f2f" flood-opacity="0.08" />
    </filter>
  </defs>

  <g fill="none" stroke="#68746B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M 75 68 C 86 86 103 96 128 101" />
    <path d="M 160 68 L 160 92" />
    <path d="M 245 68 C 234 86 217 96 192 101" />
    <path d="M 160 128 L 160 148" />
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#2F2F2F" text-anchor="middle">
    <g filter="url(#paper-shadow)">
      <rect x="22" y="18" width="72" height="38" rx="5" fill="#FFFDF8" stroke="#555F58" stroke-width="1.4" />
      <text x="58" y="42">Bitrix</text>
    </g>
    <g filter="url(#paper-shadow)">
      <rect x="118" y="18" width="84" height="38" rx="5" fill="#FFFDF8" stroke="#555F58" stroke-width="1.4" />
      <text x="160" y="42">Сервисы</text>
    </g>
    <g filter="url(#paper-shadow)">
      <rect x="226" y="18" width="72" height="38" rx="5" fill="#FFFDF8" stroke="#555F58" stroke-width="1.4" />
      <text x="262" y="42">1C</text>
    </g>
    <g filter="url(#paper-shadow)">
      <rect x="126" y="98" width="68" height="38" rx="5" fill="#FFFDF8" stroke="#555F58" stroke-width="1.4" />
      <text x="160" y="122">API</text>
    </g>
    <g filter="url(#paper-shadow)">
      <ellipse cx="160" cy="166" rx="28" ry="17" fill="#FFFDF8" stroke="#555F58" stroke-width="1.4" />
      <path d="M 132 166 C 132 156.6 144.5 149 160 149 C 175.5 149 188 156.6 188 166" fill="none" stroke="#555F58" stroke-width="1.4" />
      <text x="160" y="171">DB</text>
    </g>
  </g>
</svg>
