<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1320" viewBox="0 0 1440 1320" fill="none">
  <defs>
    <style>
      .bg { fill: #f8f5ed; }
      .card { fill: #fffdf8; stroke: #e2dccf; stroke-width: 1.2; }
      .soft { fill: #f4efe4; }
      .grid { stroke: #e8e2d8; stroke-width: 1; opacity: .65; }
      .text { fill: #1f2521; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #68736b; font-family: Inter, Arial, sans-serif; }
      .serif { fill: #1f2521; font-family: Georgia, 'Times New Roman', serif; }
      .green { fill: #2f6f45; }
      .greenStroke { stroke: #2f6f45; }
      .blue { fill: #2c6fb7; }
      .orange { fill: #d98934; }
      .tag { fill: #edf4ee; stroke: #d5e2d6; }
      .shadow { filter: drop-shadow(0 12px 24px rgba(31,37,33,.08)); }
      .small { font-size: 15px; }
      .body { font-size: 17px; }
      .h2 { font-size: 24px; font-weight: 700; }
      .h3 { font-size: 18px; font-weight: 700; }
    </style>
    <pattern id="paperGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" class="grid"/>
    </pattern>
  </defs>

  <rect class="bg" width="1440" height="1320"/>

  <!-- Header -->
  <rect x="0" y="0" width="1440" height="78" fill="#fffdf8" stroke="#e2dccf"/>
  <rect x="42" y="22" width="38" height="38" rx="10" fill="#eef5ed" stroke="#cfdccc"/>
  <text x="55" y="48" class="green" font-family="Georgia, serif" font-size="20" font-weight="700">SF</text>
  <text x="94" y="34" class="text" font-size="16" font-weight="700">Сергей Фомин</text>
  <text x="94" y="55" class="muted" font-size="13">Рабочие заметки инженера</text>
  <text x="604" y="44" class="green" font-size="15" font-weight="700">Главная</text>
  <line x1="594" y1="76" x2="666" y2="76" stroke="#2f6f45" stroke-width="3"/>
  <text x="706" y="44" class="text" font-size="15">Заметки</text>
  <text x="812" y="44" class="text" font-size="15">Разборы</text>
  <text x="925" y="44" class="text" font-size="15">Чек-листы</text>
  <text x="1053" y="44" class="text" font-size="15">Темы</text>
  <text x="1144" y="44" class="text" font-size="15">Обо мне</text>
  <circle cx="1330" cy="39" r="8" stroke="#1f2521" stroke-width="2"/>
  <path d="M1336 45L1346 55" stroke="#1f2521" stroke-width="2" stroke-linecap="round"/>

  <!-- Layout columns -->
  <g class="shadow">
    <rect x="44" y="116" width="948" height="478" rx="16" class="card"/>
    <rect x="44" y="116" width="948" height="478" rx="16" fill="url(#paperGrid)" opacity=".9"/>
  </g>

  <!-- Notebook spiral -->
  <g opacity=".75">
    <rect x="38" y="144" width="18" height="406" rx="9" fill="#1f2521" opacity=".09"/>
    <g stroke="#1f2521" stroke-width="4" stroke-linecap="round">
      <path d="M51 160 C26 160 26 185 51 185"/>
      <path d="M51 214 C26 214 26 239 51 239"/>
      <path d="M51 268 C26 268 26 293 51 293"/>
      <path d="M51 322 C26 322 26 347 51 347"/>
      <path d="M51 376 C26 376 26 401 51 401"/>
      <path d="M51 430 C26 430 26 455 51 455"/>
      <path d="M51 484 C26 484 26 509 51 509"/>
    </g>
  </g>

  <!-- Hero text -->
  <text x="154" y="180" class="green" font-size="15" font-weight="800" letter-spacing="1.2">ИНЖЕНЕРНЫЙ БЛОКНОТ</text>
  <text x="154" y="246" class="serif" font-size="56" font-weight="700">Рабочие заметки</text>
  <text x="154" y="308" class="serif" font-size="56" font-weight="700">инженера</text>
  <text x="154" y="360" class="muted" font-size="18">Практические заметки о веб-разработке, интеграциях,</text>
  <text x="154" y="388" class="muted" font-size="18">релизах, оценке задач и процессах в команде.</text>

  <g transform="translate(154 448)">
    <circle cx="12" cy="12" r="12" fill="#eef5ed" stroke="#cfdccc"/>
    <path d="M8 12l3 3 6-7" stroke="#2f6f45" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="34" y="8" class="text" font-size="14" font-weight="700">Из практики</text>
    <text x="34" y="30" class="muted" font-size="13">без теории ради теории</text>
  </g>
  <g transform="translate(360 448)">
    <circle cx="12" cy="12" r="12" fill="#eef5ed" stroke="#cfdccc"/>
    <path d="M8 12l3 3 6-7" stroke="#2f6f45" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="34" y="8" class="text" font-size="14" font-weight="700">Проверено</text>
    <text x="34" y="30" class="muted" font-size="13">на реальных проектах</text>
  </g>
  <g transform="translate(562 448)">
    <circle cx="12" cy="12" r="12" fill="#eef5ed" stroke="#cfdccc"/>
    <path d="M8 12l3 3 6-7" stroke="#2f6f45" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="34" y="8" class="text" font-size="14" font-weight="700">Понятно</text>
    <text x="34" y="30" class="muted" font-size="13">без лишнего героизма</text>
  </g>
  <text x="154" y="548" fill="#2f6f45" font-family="'Comic Sans MS', 'Segoe Print', cursive" font-size="28" font-style="italic">Не идеально, но понятно и работает.</text>

  <!-- Hero scheme -->
  <g transform="translate(648 190)">
    <rect x="20" y="0" width="88" height="44" rx="6" fill="#fffdf8" stroke="#4d554f"/>
    <text x="48" y="28" class="text" font-size="16">Bitrix</text>
    <rect x="164" y="0" width="88" height="44" rx="6" fill="#fffdf8" stroke="#4d554f"/>
    <text x="190" y="28" class="text" font-size="16">API</text>
    <rect x="308" y="0" width="88" height="44" rx="6" fill="#fffdf8" stroke="#4d554f"/>
    <text x="340" y="28" class="text" font-size="16">1C</text>
    <rect x="164" y="108" width="88" height="44" rx="6" fill="#fffdf8" stroke="#4d554f"/>
    <text x="192" y="136" class="text" font-size="16">DB</text>
    <path d="M108 22h56" stroke="#4d554f" stroke-width="1.7" marker-end="url(#arrow)"/>
    <path d="M252 22h56" stroke="#4d554f" stroke-width="1.7"/>
    <path d="M208 44v64" stroke="#4d554f" stroke-width="1.7"/>
    <path d="M352 44v90h-100" stroke="#4d554f" stroke-width="1.3" stroke-dasharray="7 5"/>
    <path d="M64 44v90h100" stroke="#4d554f" stroke-width="1.3" stroke-dasharray="7 5"/>
  </g>
  <g transform="translate(650 405) rotate(-5)">
    <rect width="292" height="120" rx="5" fill="#f3dfa0" stroke="#e1ca7e"/>
    <text x="38" y="38" class="text" font-size="15" font-family="monospace">def solve(problem):</text>
    <text x="62" y="62" class="text" font-size="15" font-family="monospace">understand(problem)</text>
    <text x="62" y="86" class="text" font-size="15" font-family="monospace">simplify()</text>
    <text x="62" y="110" class="text" font-size="15" font-family="monospace">document()</text>
  </g>

  <!-- Right sidebar -->
  <g class="shadow">
    <rect x="1022" y="116" width="374" height="496" rx="16" class="card"/>
  </g>
  <text x="1050" y="158" class="h2 text">Коротко обо мне</text>
  <circle cx="1115" cy="230" r="52" fill="#eef0e8"/>
  <text x="1090" y="244" class="green" font-family="Georgia, serif" font-size="38" font-weight="700">SF</text>
  <text x="1050" y="324" class="text body">Занимаюсь веб-разработкой,</text>
  <text x="1050" y="350" class="text body">внутренними системами</text>
  <text x="1050" y="376" class="text body">и интеграциями.</text>
  <text x="1050" y="424" class="text body">Люблю, когда сложные процессы</text>
  <text x="1050" y="450" class="text body">становятся понятными, задачи —</text>
  <text x="1050" y="476" class="text body">предсказуемыми, а решения можно</text>
  <text x="1050" y="502" class="text body">поддерживать без героизма.</text>
  <rect x="1050" y="548" width="216" height="42" rx="8" fill="#f7fbf6" stroke="#aac7ad"/>
  <text x="1074" y="575" class="green" font-size="15" font-weight="700">Подробнее обо мне →</text>

  <!-- Start block -->
  <g class="shadow"><rect x="44" y="630" width="948" height="290" rx="16" class="card"/></g>
  <text x="68" y="672" class="h2 text">С чего начать</text>
  <text x="68" y="698" class="muted small">Материалы, с которых удобно войти в контекст.</text>
  <g transform="translate(68 724)">
    <g><rect width="212" height="160" rx="10" class="card"/><rect x="18" y="20" width="34" height="34" rx="8" fill="#edf4ee"/><text x="18" y="72" class="h3 text">Большой Bitrix и Git:</text><text x="18" y="96" class="h3 text">почему все сложно</text><text x="18" y="126" class="muted small">Контент на проде, файлы</text><text x="18" y="148" class="muted small">не в репозитории.</text></g>
    <g transform="translate(248 0)"><rect width="212" height="160" rx="10" class="card"/><rect x="18" y="20" width="34" height="34" rx="8" fill="#eef5fb"/><text x="18" y="72" class="h3 text">Почему маленькая</text><text x="18" y="96" class="h3 text">правка не маленькая</text><text x="18" y="126" class="muted small">Цепочка зависимостей,</text><text x="18" y="148" class="muted small">о которой забывают.</text></g>
    <g transform="translate(496 0)"><rect width="212" height="160" rx="10" class="card"/><rect x="18" y="20" width="34" height="34" rx="8" fill="#fff1dd"/><text x="18" y="72" class="h3 text">Чек-лист перед</text><text x="18" y="96" class="h3 text">интеграционной задачей</text><text x="18" y="126" class="muted small">Что уточнить до разработки</text><text x="18" y="148" class="muted small">эндпоинта.</text></g>
    <g transform="translate(744 0)"><rect width="160" height="160" rx="10" class="card"/><rect x="18" y="20" width="34" height="34" rx="8" fill="#f0eefb"/><text x="18" y="72" class="h3 text">Как я оцениваю</text><text x="18" y="96" class="h3 text">задачи и риски</text><text x="18" y="126" class="muted small">Подход к сложным</text><text x="18" y="148" class="muted small">задачам.</text></g>
  </g>

  <!-- Fresh notes -->
  <g class="shadow"><rect x="44" y="942" width="948" height="300" rx="16" class="card"/></g>
  <text x="68" y="984" class="h2 text">Свежие заметки</text>
  <g transform="translate(68 1014)">
    <rect x="0" y="0" width="58" height="58" rx="10" fill="#edf4ee"/>
    <text x="88" y="20" class="h3 text">Контент на проде и Git: рабочий компромисс</text>
    <text x="88" y="46" class="muted small">Как жить, если редакторы создают файлы через админку, а разработчики хотят видеть всё в репозитории.</text>
    <rect x="668" y="14" width="54" height="24" rx="7" class="tag"/><text x="681" y="31" class="muted" font-size="12">Bitrix</text>
    <rect x="734" y="14" width="42" height="24" rx="7" class="tag"/><text x="748" y="31" class="muted" font-size="12">Git</text>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#e7e0d4"/>
  </g>
  <g transform="translate(68 1104)">
    <rect x="0" y="0" width="58" height="58" rx="10" fill="#fff1dd"/>
    <text x="88" y="20" class="h3 text">Почему маленькая правка редко бывает маленькой</text>
    <text x="88" y="46" class="muted small">История одной правки и разбор скрытых работ: интеграции, тесты, релиз, документация.</text>
    <rect x="668" y="14" width="70" height="24" rx="7" class="tag"/><text x="681" y="31" class="muted" font-size="12">Оценка</text>
    <rect x="750" y="14" width="82" height="24" rx="7" class="tag"/><text x="763" y="31" class="muted" font-size="12">Процессы</text>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#e7e0d4"/>
  </g>
  <g transform="translate(68 1194)">
    <rect x="0" y="0" width="58" height="58" rx="10" fill="#eef5fb"/>
    <text x="88" y="20" class="h3 text">Чек-лист перед интеграционной задачей</text>
    <text x="88" y="46" class="muted small">15 вопросов, которые помогают собрать требования и не забыть важного.</text>
  </g>

  <!-- Sidebar cards lower -->
  <g class="shadow"><rect x="1022" y="636" width="374" height="270" rx="16" class="card"/></g>
  <text x="1050" y="678" class="h2 text">Избранные чек-листы</text>
  <text x="1088" y="724" class="text small" font-weight="700">Перед релизом Bitrix-проекта</text><text x="1088" y="746" class="muted" font-size="13">12 пунктов</text>
  <text x="1088" y="794" class="text small" font-weight="700">Перед интеграционной задачей</text><text x="1088" y="816" class="muted" font-size="13">15 пунктов</text>
  <text x="1088" y="864" class="text small" font-weight="700">Приёмка задачи от аналитика</text><text x="1088" y="886" class="muted" font-size="13">10 пунктов</text>

  <g class="shadow"><rect x="1022" y="928" width="374" height="314" rx="16" class="card"/></g>
  <text x="1050" y="970" class="h2 text">Темы</text>
  <g transform="translate(1050 1000)">
    <rect width="68" height="30" rx="8" class="tag"/><text x="18" y="20" class="green" font-size="13">Bitrix</text>
    <rect x="82" width="116" height="30" rx="8" class="tag"/><text x="99" y="20" class="green" font-size="13">Интеграции</text>
    <rect x="212" width="118" height="30" rx="8" class="tag"/><text x="228" y="20" class="green" font-size="13">Архитектура</text>
    <rect y="46" width="50" height="30" rx="8" class="tag"/><text x="18" y="66" class="green" font-size="13">Git</text>
    <rect x="64" y="46" width="94" height="30" rx="8" class="tag"/><text x="80" y="66" class="green" font-size="13">Процессы</text>
    <rect x="172" y="46" width="112" height="30" rx="8" class="tag"/><text x="188" y="66" class="green" font-size="13">Оценка</text>
    <rect y="92" width="76" height="30" rx="8" class="tag"/><text x="17" y="112" class="green" font-size="13">DevOps</text>
    <rect x="90" y="92" width="58" height="30" rx="8" class="tag"/><text x="108" y="112" class="green" font-size="13">API</text>
    <rect x="162" y="92" width="86" height="30" rx="8" class="tag"/><text x="178" y="112" class="green" font-size="13">Команда</text>
  </g>

  <!-- Footer -->
  <rect x="0" y="1260" width="1440" height="60" fill="#efe8da"/>
  <text x="56" y="1295" class="muted" font-size="14">© 2026 Сергей Фомин</text>
  <text x="540" y="1295" class="serif" font-size="17" font-style="italic">“ Документируй то, что узнал сегодня, чтобы завтра не разбираться заново. ”</text>
</svg>
